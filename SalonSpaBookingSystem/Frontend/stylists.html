<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Stylists & Staff - Glow & Ease</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Sticky Navigation Bar -->
    <header class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-wand-magic-sparkles"></i> Glow & Ease
            </a>
            <nav>
                <ul class="nav-links" id="nav-links-list"></ul>
            </nav>
        </div>
    </header>

    <!-- Header Section -->
    <section class="section" style="padding-bottom: 2rem;">
        <div class="container">
            <h1 class="section-title">Meet Our Experts</h1>
            <p class="section-subtitle">Our team consists of internationally trained hair sculptors, beauty therapists, and massage specialists dedicated to your comfort.</p>
        </div>
    </section>

    <!-- Stylist Grid -->
    <section class="section" style="padding-top: 0;">
        <div class="container">
            <div class="grid-3" id="stylists-grid">
                <!-- Dynamically loaded by script.js -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Glow & Ease Salon & Spa. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
