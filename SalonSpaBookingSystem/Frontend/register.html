<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Register - Glow & Ease</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Sticky Navigation Bar -->
    <header class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-wand-magic-sparkles"></i> Glow & Ease
            </a>
            <nav>
                <ul class="nav-links" id="nav-links-list"></ul>
            </nav>
        </div>
    </header>

    <!-- Auth Wrapper -->
    <div class="auth-wrapper" style="padding: 2rem 1rem;">
        <div class="auth-card" style="max-width: 500px;">
            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Register to book premium salon & spa therapies</p>
            </div>
            
            <div id="register-error" style="color: #ef4444; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); padding: 0.75rem; border-radius: 8px; font-size: 0.9rem; margin-bottom: 1.5rem; text-align: center; display: none;"></div>
            
            <form id="register-form">
                <div class="form-group">
                    <label for="name" class="form-label">Full Name</label>
                    <input type="text" id="name" class="form-input" placeholder="e.g. Rahul Sharma" required>
                </div>
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="e.g. rahul@gmail.com" required>
                </div>
                <div class="form-group">
                    <label for="phone" class="form-label">Phone Number</label>
                    <input type="tel" id="phone" class="form-input" placeholder="e.g. 9876543210" required>
                </div>
                <div class="form-group">
                    <label for="gender" class="form-label">Gender</label>
                    <select id="gender" class="form-input form-select" required>
                        <option value="">-- Select Gender --</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.8rem;">
                    Sign Up <i class="fa-solid fa-user-plus"></i>
                </button>
            </form>
            
            <div class="form-footer">
                Already registered? <a href="login.html">Login Here</a>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Glow & Ease Salon & Spa. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        // Make the error div display dynamically
        const observer = new MutationObserver(() => {
            const errorDiv = document.getElementById('register-error');
            if (errorDiv.textContent.trim() !== '') {
                errorDiv.style.display = 'block';
            } else {
                errorDiv.style.display = 'none';
            }
        });
        observer.observe(document.getElementById('register-error'), { childList: true });
    </script>
</body>
</html>
